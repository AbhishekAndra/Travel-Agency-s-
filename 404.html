  <!--
    404.html lives at the repo root so GitHub Pages can serve it for any bad
    URL, at any depth. Because the browser keeps the ORIGINAL (bad) URL when
    GitHub Pages serves this file, relative paths like "css/..." would
    resolve incorrectly depending on how deep that URL was. To stay correct
    regardless of depth, this page is fully self-contained (inline styles,
    no dependency on css/*.css) and every link below is root-absolute
    ("/index.html", not "index.html" or "../index.html").

    Note: root-absolute paths assume the site is deployed at the domain
    root (e.g. username.github.io). If this repo is deployed as a project
    page instead (username.github.io/repo-name/), prefix every href below
    with "/repo-name" to match.

  <style>
    :root {
      --color-navy: #0B1F3A;
      --color-gold: #C9A24B;
      --color-gold-light: #E4C98A;
      --color-cream: #FAF8F4;
      --color-charcoal: #1F1F1F;
      --color-grey-300: #DAD6CD;
      --color-grey-600: #6B675E;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      background-color: var(--color-navy);
      color: var(--color-cream);
      font-family: var(--font-body);
      text-align: center;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    .not-found-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .not-found-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(11, 31, 58, 0.55) 0%, rgba(11, 31, 58, 0.65) 45%, rgba(11, 31, 58, 0.8) 100%);
      z-index: -1;
    }

    .not-found {
      max-width: 480px;
    }

    .not-found-logo {
      display: inline-block;
      margin-bottom: 48px;
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--color-cream);
      text-decoration: none;
      text-shadow: 0 1px 12px rgba(7, 20, 41, 0.4);
    }

    .not-found-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: var(--color-gold);
    }

    .not-found-code {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 600;
      line-height: 1;
      color: var(--color-cream);
      margin: 0 0 16px;
      text-shadow: 0 2px 16px rgba(7, 20, 41, 0.45);
    }

    .not-found h1 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--color-cream);
      margin: 0 0 12px;
      text-shadow: 0 2px 16px rgba(7, 20, 41, 0.45);
    }

    .not-found p {
      color: var(--color-grey-300);
      line-height: 1.6;
      margin: 0 0 32px;
      text-shadow: 0 1px 12px rgba(7, 20, 41, 0.4);
    }

    .not-found-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      background-color: var(--color-gold);
      color: var(--color-navy);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background-color 200ms ease;
    }

    .not-found-cta:hover {
      background-color: var(--color-gold-light);
    }

    .not-found-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid rgba(250, 248, 244, 0.2);
    }

    .not-found-links a {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--color-grey-300);
      text-decoration: none;
    }

    .not-found-links a:hover {
      color: var(--color-gold);
    }

    @media (prefers-reduced-motion: reduce) {
      .not-found-bg {
        display: none;
      }

      body {
        background-image: url('/assets/images/hero/home.webp');
        background-size: cover;
        background-position: center;
      }
    }
  </style>

      <circle cx="32" cy="32" r="26" stroke-dasharray="4 5"/>
      <path d="M32 20l6 10-6 10-6-10z"/>
      <circle cx="32" cy="32" r="2" fill="currentColor" stroke="none"/>

      <a href="/pages/packages.html">Packages</a>

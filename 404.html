<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Voyara</title>
  <!--
    404.html lives at the repo root so GitHub Pages can serve it for any bad
    URL, at any depth. Because the browser keeps the ORIGINAL (bad) URL when
    GitHub Pages serves this file, relative paths like "css/..." would
    resolve incorrectly depending on how deep that URL was. To stay correct
    regardless of depth, this page is fully self-contained (inline styles,
    no dependency on css/*.css) and every link below is root-absolute
    ("/index.html", not "index.html" or "../index.html").

    Note: root-absolute paths assume the site is deployed at the domain
    root (e.g. username.github.io). If this repo is deployed as a project
    page instead (username.github.io/repo-name/), prefix every href below
    with "/repo-name" to match.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --color-navy: #0B1F3A;
      --color-gold: #C9A24B;
      --color-gold-light: #E4C98A;
      --color-cream: #FAF8F4;
      --color-charcoal: #1F1F1F;
      --color-grey-300: #DAD6CD;
      --color-grey-600: #6B675E;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      background-color: var(--color-cream);
      color: var(--color-charcoal);
      font-family: var(--font-body);
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .not-found {
      max-width: 480px;
    }

    .not-found-logo {
      display: inline-block;
      margin-bottom: 48px;
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--color-navy);
      text-decoration: none;
    }

    .not-found-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: var(--color-gold);
    }

    .not-found-code {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 600;
      line-height: 1;
      color: var(--color-navy);
      margin: 0 0 16px;
    }

    .not-found h1 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--color-navy);
      margin: 0 0 12px;
    }

    .not-found p {
      color: var(--color-grey-600);
      line-height: 1.6;
      margin: 0 0 32px;
    }

    .not-found-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      background-color: var(--color-navy);
      color: var(--color-cream);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background-color 200ms ease;
    }

    .not-found-cta:hover {
      background-color: #14335C;
    }

    .not-found-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--color-grey-300);
    }

    .not-found-links a {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--color-grey-600);
      text-decoration: none;
    }

    .not-found-links a:hover {
      color: var(--color-gold);
    }
  </style>
</head>
<body>
  <div class="not-found">
    <a href="/index.html" class="not-found-logo">Voyara</a>

    <svg class="not-found-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="32" cy="32" r="26" stroke-dasharray="4 5"/>
      <path d="M32 20l6 10-6 10-6-10z"/>
      <circle cx="32" cy="32" r="2" fill="currentColor" stroke="none"/>
    </svg>

    <p class="not-found-code">404</p>
    <h1>This Destination Doesn't Exist</h1>
    <p>The page you're looking for may have been moved, renamed, or never existed. Let's get you back on course.</p>

    <a href="/index.html" class="not-found-cta">Back to Home</a>

    <nav class="not-found-links" aria-label="Popular pages">
      <a href="/pages/flights.html">Flights</a>
      <a href="/pages/hotels.html">Hotels</a>
      <a href="/pages/packages.html">Packages</a>
      <a href="/pages/tours.html">Tours</a>
    </nav>
  </div>
</body>
</html>
